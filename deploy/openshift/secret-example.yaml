# =====================================================================
#  EJEMPLO de Secret. NO usar en produccion.
#  En produccion estos valores los inyecta CyberArk Conjur (Secrets Provider
#  for OpenShift) que materializa un Secret o monta variables de ambiente.
#  Ver deploy/openshift/conjur-notes.md
# =====================================================================
apiVersion: v1
kind: Secret
metadata:
  name: comision-variable-secrets
  labels:
    app: comision-variable
  annotations:
    # Marca para que Conjur Secrets Provider rellene estas claves
    conjur.org/conjur-secrets-policy-path: "secrets/comision-variable"
type: Opaque
stringData:
  DB_USERNAME: "REEMPLAZAR_POR_CONJUR"
  DB_PASSWORD: "REEMPLAZAR_POR_CONJUR"
  KEYCLOAK_CLIENT_SECRET: "REEMPLAZAR_POR_CONJUR"
  SPIN_CLIENT_ID: "REEMPLAZAR_POR_CONJUR"
  SPIN_CLIENT_SECRET: "REEMPLAZAR_POR_CONJUR"
  SPIN_API_KEY: "REEMPLAZAR_POR_CONJUR"

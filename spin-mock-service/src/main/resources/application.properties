# =====================================================================
#  Spin Mock Service — simulador del API Spin dirigido por BD.
#  Escenarios en la tabla 'escenario_spin' (misma BD comvar del piloto).
# =====================================================================
quarkus.application.name=spin-mock-service
quarkus.http.port=${HTTP_PORT:8080}

# --- PostgreSQL (misma BD del piloto: comvar) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:comvar}
quarkus.datasource.password=${DB_PASSWORD:comvar}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:comvar}
quarkus.datasource.jdbc.max-size=${DB_POOL_MAX_SIZE:8}

quarkus.hibernate-orm.database.generation=none

# --- Flyway AISLADO: tabla de historial propia para no chocar con el
#     servicio principal (que usa el flyway_schema_history por defecto). ---
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.table=flyway_history_spinmock
quarkus.flyway.locations=db/migration

# --- OpenAPI / Swagger del mock ---
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# --- Logs ---
quarkus.log.level=INFO
quarkus.log.category."com.oxxo.spin.spinmock".level=DEBUG

# =====================================================================
#  Dev-container como ALTERNATIVA a docker compose manual.
#  Al abrir la carpeta en el dev-container, este compose levanta el
#  workspace de desarrollo + todas las dependencias del piloto:
#  PostgreSQL + Keycloak (realm applications) + Redis + mock Spin.
#  Las rutas son relativas a .devcontainer (la raiz del proyecto es ../..).
# =====================================================================
name: comvar-devcontainer

services:
  # ---- Contenedor de desarrollo (donde corre VS Code / el codigo) ----
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    command: sleep infinity
    volumes:
      - ../..:/workspaces/spin-comision-variable:cached
    environment:
      QUARKUS_PROFILE: demo
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: comvar
      DB_USERNAME: comvar
      DB_PASSWORD: comvar
      KEYCLOAK_URL: http://keycloak:8081
      KEYCLOAK_REALM: applications
      KEYCLOAK_CLIENT_ID: comision-variable-api
      KEYCLOAK_CLIENT_SECRET: comision-variable-secret
      SPIN_API_URL: http://spin-mock:8080
      SPIN_AUTH_URL: http://spin-mock:8080
      SPIN_CLIENT_ID: demo-client
      SPIN_CLIENT_SECRET: demo-secret
      SPIN_API_KEY: demo-api-key
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      redis:
        condition: service_started
      spin-mock:
        condition: service_started

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: comvar
      POSTGRES_USER: comvar
      POSTGRES_PASSWORD: comvar
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comvar -d comvar"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8081
    volumes:
      - ../../deploy/keycloak/realm-applications.json:/opt/keycloak/data/import/realm-applications.json:ro

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  spin-mock:
    image: wiremock/wiremock:3.9.1
    command: ["--global-response-templating", "--verbose"]
    volumes:
      - ../../mock-spin/mappings:/home/wiremock/mappings:ro
      - ../../mock-spin/__files:/home/wiremock/__files:ro

volumes:
  pgdata:

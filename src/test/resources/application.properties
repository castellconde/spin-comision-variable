# Configuracion para pruebas (@QuarkusTest).
# OIDC se desactiva: la autenticacion se simula con @TestSecurity (quarkus-test-security).
%test.quarkus.oidc.enabled=false

# Logs legibles en consola durante test
%test.quarkus.log.console.json=false

# Sin trazas OTLP ni Redis en test
%test.quarkus.otel.enabled=false
%test.cache.redis.enabled=false
%test.quarkus.redis.devservices.enabled=false

# La base de datos usa Dev Services (PostgreSQL en contenedor) automaticamente.
# Flyway corre las migraciones reales contra esa BD efimera.
%test.quarkus.flyway.migrate-at-start=true

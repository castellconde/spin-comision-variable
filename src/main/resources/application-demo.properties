# =====================================================================
#  Perfil DEMO / piloto local (docker-compose)
#  Activar con: -Dquarkus.profile=demo  o  QUARKUS_PROFILE=demo
#  Apunta a los servicios levantados por docker-compose.
# =====================================================================

# Postgres del compose
%demo.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/comvar
%demo.quarkus.datasource.username=comvar
%demo.quarkus.datasource.password=comvar

# Keycloak local realm applications
%demo.quarkus.oidc.auth-server-url=http://localhost:8081/realms/applications
%demo.quarkus.oidc.client-id=comision-variable-api
%demo.quarkus.oidc.credentials.secret=comision-variable-secret

# Mock del API Spin (ver carpeta mock-spin)
%demo.quarkus.rest-client.spin-api.url=http://localhost:8082
%demo.quarkus.rest-client.spin-auth.url=http://localhost:8082
%demo.spin.client-id=demo-client
%demo.spin.client-secret=demo-secret
%demo.spin.api-key=demo-api-key

# Redis del compose (opcional)
%demo.cache.redis.enabled=true
%demo.quarkus.redis.hosts=redis://localhost:6379

# Trazas: solo logs JSON, sin agente OTLP en local
%demo.quarkus.otel.enabled=false

# =====================================================================
#  SPIN - Comision Variable  |  Configuracion base
#  Los secretos (client-id, client-secret, credenciales BD) se inyectan
#  por VARIABLES DE AMBIENTE provistas por CyberArk Conjur en runtime.
#  Nunca se versionan valores reales en este archivo.
# =====================================================================

quarkus.application.name=comision-variable
quarkus.application.version=1.0.0

# ---------------------------------------------------------------------
# HTTP
# ---------------------------------------------------------------------
quarkus.http.port=${HTTP_PORT:8080}
quarkus.http.root-path=/
# Path base de la API de negocio
quarkus.rest.path=/rest

# ---------------------------------------------------------------------
# Base de datos PostgreSQL (bitacora + configuracion)
#   Credenciales inyectadas por Conjur via variables de ambiente.
# ---------------------------------------------------------------------
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:comvar}
quarkus.datasource.password=${DB_PASSWORD:comvar}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:comvar}
quarkus.datasource.jdbc.max-size=${DB_POOL_MAX_SIZE:16}
quarkus.datasource.jdbc.min-size=${DB_POOL_MIN_SIZE:2}

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway gestiona el esquema (bitacora particionada + configuracion)
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=db/migration

# ---------------------------------------------------------------------
# Seguridad - Keycloak / OIDC  (realm de aplicaciones)
#   Service-to-service: el POS presenta un Bearer token emitido por
#   Keycloak en el realm 'applications'.
# ---------------------------------------------------------------------
quarkus.oidc.auth-server-url=${KEYCLOAK_URL:http://localhost:8081}/realms/${KEYCLOAK_REALM:applications}
quarkus.oidc.client-id=${KEYCLOAK_CLIENT_ID:comision-variable-api}
quarkus.oidc.credentials.secret=${KEYCLOAK_CLIENT_SECRET:change-me}
quarkus.oidc.application-type=service
quarkus.oidc.token.issuer=any
# Ronda de proteccion: todo /rest/v1/** requiere autenticacion
quarkus.http.auth.permission.authenticated.paths=/rest/v1/*
quarkus.http.auth.permission.authenticated.policy=authenticated
# Endpoints publicos: health, openapi, swagger
quarkus.http.auth.permission.public.paths=/q/*,/rest/openapi,/swagger-ui/*
quarkus.http.auth.permission.public.policy=permit

# ---------------------------------------------------------------------
# REST client hacia API Spin  (OAuth2 apikey + token)
#   URL y credenciales inyectadas por Conjur via variables de ambiente.
# ---------------------------------------------------------------------
quarkus.rest-client.spin-api.url=${SPIN_API_URL:http://localhost:8082}
quarkus.rest-client.spin-api.scope=jakarta.inject.Singleton
quarkus.rest-client.spin-auth.url=${SPIN_AUTH_URL:http://localhost:8082}
quarkus.rest-client.spin-auth.scope=jakarta.inject.Singleton

# Parametros de integracion Spin (algunos sobre-escribibles desde tabla configuracion)
spin.client-id=${SPIN_CLIENT_ID:demo-client}
spin.client-secret=${SPIN_CLIENT_SECRET:demo-secret}
spin.api-key=${SPIN_API_KEY:demo-api-key}
spin.token-grant-type=client_credentials
spin.connect-timeout-ms=${SPIN_CONNECT_TIMEOUT_MS:2000}
spin.read-timeout-ms=${SPIN_READ_TIMEOUT_MS:5000}

# ---------------------------------------------------------------------
# Fault Tolerance hacia Spin  (CONFIGURABLE por properties / env)
#   Formato MicroProfile/SmallRye: <clase>/<metodo>/<anotacion>/<parametro>.
#   Aplica sobre el adaptador de salida (puerto ComisionProviderPort).
# ---------------------------------------------------------------------
# Reintentos
com.oxxo.spin.comisionvariable.adapter.out.spin.SpinComisionAdapter/obtenerComision/Retry/maxRetries=${SPIN_RETRY_MAX:3}
com.oxxo.spin.comisionvariable.adapter.out.spin.SpinComisionAdapter/obtenerComision/Retry/delay=${SPIN_RETRY_DELAY_MS:300}
com.oxxo.spin.comisionvariable.adapter.out.spin.SpinComisionAdapter/obtenerComision/Retry/delayUnit=MILLIS
com.oxxo.spin.comisionvariable.adapter.out.spin.SpinComisionAdapter/obtenerComision/Retry/jitter=${SPIN_RETRY_JITTER_MS:100}
com.oxxo.spin.comisionvariable.adapter.out.spin.SpinComisionAdapter/obtenerComision/Retry/jitterDelayUnit=MILLIS
# Circuit breaker
com.oxxo.spin.comisionvariable.adapter.out.spin.SpinComisionAdapter/obtenerComision/CircuitBreaker/requestVolumeThreshold=${SPIN_CB_VOLUME:8}
com.oxxo.spin.comisionvariable.adapter.out.spin.SpinComisionAdapter/obtenerComision/CircuitBreaker/failureRatio=${SPIN_CB_FAILURE_RATIO:0.5}
com.oxxo.spin.comisionvariable.adapter.out.spin.SpinComisionAdapter/obtenerComision/CircuitBreaker/delay=${SPIN_CB_DELAY_MS:5000}
com.oxxo.spin.comisionvariable.adapter.out.spin.SpinComisionAdapter/obtenerComision/CircuitBreaker/delayUnit=MILLIS
com.oxxo.spin.comisionvariable.adapter.out.spin.SpinComisionAdapter/obtenerComision/CircuitBreaker/successThreshold=${SPIN_CB_SUCCESS:2}
# Timeout
com.oxxo.spin.comisionvariable.adapter.out.spin.SpinComisionAdapter/obtenerComision/Timeout/value=${SPIN_TIMEOUT_MS:6000}
com.oxxo.spin.comisionvariable.adapter.out.spin.SpinComisionAdapter/obtenerComision/Timeout/unit=MILLIS
# Rate limit (SmallRye): peticiones por ventana
com.oxxo.spin.comisionvariable.adapter.out.spin.SpinComisionAdapter/obtenerComision/RateLimit/value=${SPIN_RATELIMIT_VALUE:50}
com.oxxo.spin.comisionvariable.adapter.out.spin.SpinComisionAdapter/obtenerComision/RateLimit/window=${SPIN_RATELIMIT_WINDOW_MS:1000}
com.oxxo.spin.comisionvariable.adapter.out.spin.SpinComisionAdapter/obtenerComision/RateLimit/windowUnit=MILLIS

# ---------------------------------------------------------------------
# Redis OPCIONAL (cache de token Spin).  Si no esta disponible el
# servicio degrada de forma elegante (no se rompe).
# ---------------------------------------------------------------------
cache.redis.enabled=${REDIS_ENABLED:false}
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}
quarkus.redis.timeout=${REDIS_TIMEOUT:1s}
# El devservice de Redis se desactiva: es opcional.
quarkus.redis.devservices.enabled=false

# ---------------------------------------------------------------------
# Logs estructurados JSON para Datadog (rastreabilidad)
#   trace_id / span_id se inyectan al MDC para correlacion con APM.
# ---------------------------------------------------------------------
quarkus.log.console.json=true
quarkus.log.console.json.additional-field."service.name".value=comision-variable
quarkus.log.console.json.additional-field."service.env".value=${DD_ENV:local}
quarkus.log.console.json.additional-field."service.version".value=1.0.0
quarkus.log.level=INFO
quarkus.log.category."com.oxxo.spin".level=DEBUG

# OpenTelemetry -> exportador OTLP (agente Datadog). Desactivado por defecto en local.
quarkus.otel.enabled=${OTEL_ENABLED:false}
quarkus.otel.traces.enabled=${OTEL_ENABLED:false}
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.service.name=comision-variable

# ---------------------------------------------------------------------
# Health checks
# ---------------------------------------------------------------------
quarkus.smallrye-health.root-path=/q/health
# El health de la BD lo aporta el datasource automaticamente.

# ---------------------------------------------------------------------
# OpenAPI / Swagger UI
# ---------------------------------------------------------------------
quarkus.smallrye-openapi.path=/rest/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
mp.openapi.extensions.smallrye.info.title=SPIN - Comision Variable API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=API de consulta de comision variable desde punto de venta.
